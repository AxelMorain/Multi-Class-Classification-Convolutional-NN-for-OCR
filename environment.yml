name: ocr-classification
channels:
  - conda-forge
  - anaconda
  - defaults
dependencies:
  - python=3.9
  # CUDA stack — TF 2.10 is the last version with native Windows GPU support
  - cudatoolkit=11.2.2
  - cudnn=8.1.0.77
  - pip:
      - tensorflow==2.10.0
      - keras==2.10.0
      - numpy==1.24.2
      - matplotlib==3.9.4
      - scikit-image==0.24.0
      - scikit-learn==1.6.1
      - scipy==1.13.1
      - pillow==11.3.0
